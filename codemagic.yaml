workflows:
  android-workflow:
    name: Green Android Release Workflow
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      node: latest
      java: 21
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
    scripts:
      - name: Install npm dependencies
        script: |
          npm install --prefix client
          npm install
      - name: Build React Client
        script: |
          npm run build --prefix client
      - name: Sync Capacitor Android
        script: |
          npx cap sync android
      - name: Set up Android Keystore
        script: |
          if [ ! -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release-key.jks
          fi
      - name: Build Android Release Package (AAB and APK)
        script: |
          cd android
          ./gradlew bundleRelease assembleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/apk/release/*.apk

  ios-workflow:
    name: Green iOS Workflow
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - ios-signing
      node: latest
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.green-nightlife.app"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
    scripts:
      - name: Install npm dependencies
        script: |
          npm install --prefix client
          npm install
      - name: Build React Client
        script: |
          npm run build --prefix client
      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios
      - name: Set up keychain
        script: |
          keychain initialize
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files $BUNDLE_ID --type IOS_APP_STORE --create
      - name: Use system default keychain
        script: |
          keychain add-certificates
      - name: Set up code signing settings
        script: |
          xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa --project "$XCODE_PROJECT" --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
