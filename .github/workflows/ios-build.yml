name: Build iOS App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: |
          package-lock.json
          client/package-lock.json

    - name: Install Root Dependencies
      run: npm install

    - name: Install Client Dependencies
      run: |
        cd client
        npm install

    - name: Build Web Application
      run: npm run build --prefix client

    - name: Sync Capacitor
      run: npx cap sync ios

    - name: Setup CocoaPods
      run: |
        cd ios/App
        pod install

    - name: Build Xcode Project (Compile Check)
      run: |
        xcodebuild -workspace ios/App/App.xcworkspace -scheme App -sdk iphonesimulator -configuration Debug CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO clean build
