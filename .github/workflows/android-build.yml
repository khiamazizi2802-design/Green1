name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: |
          package-lock.json
          client/package-lock.json

    - name: Install Root Dependencies
      run: npm install

    - name: Install Client Dependencies
      run: |
        cd client
        npm install

    - name: Build Web Application
      env:
        VITE_WS_URL: https://green1-wpng.onrender.com
        VITE_STRIPE_PUBLIC_KEY: pk_test_51TdyJNB2h3oHJV8dj9S071k3lzq8DEkDRTA54Geeq579R8EZl0Vz4lNfeIRWXWktqND4NKxeCEPob0GmkyEtrvqb003rDki96c
      run: npm run build --prefix client

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Generate Keystore
      run: |
        keytool -genkey -v -keystore release.keystore -alias greenapp -keyalg RSA -keysize 2048 -validity 10000 -storepass greenapp123 -keypass greenapp123 -dname "CN=Green App, OU=Development, O=Green Group, L=Frankfurt, ST=Hesse, C=DE"

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build Android Release AAB
      run: |
        cd android
        chmod +x gradlew
        ./gradlew bundleRelease -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/release.keystore -Pandroid.injected.signing.store.password=greenapp123 -Pandroid.injected.signing.key.alias=greenapp -Pandroid.injected.signing.key.password=greenapp123

    - name: Upload Release AAB
      uses: actions/upload-artifact@v4
      with:
        name: green-app-release-aab
        path: android/app/build/outputs/bundle/release/app-release.aab

    - name: Upload Keystore (SAVE THIS SECURELY!)
      uses: actions/upload-artifact@v4
      with:
        name: green-app-keystore
        path: release.keystore
